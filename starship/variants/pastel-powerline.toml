"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](purple)\
$os\
$username\
[¯é░](bg:bright-purple fg:purple)\
$directory\
[¯é░](fg:bright-purple bg:bright-red)\
$git_branch\
$git_status\
[¯é░](fg:bright-red bg:bright-blue)\
